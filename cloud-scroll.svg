<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 185" fill="none">
  <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!--
      祥云  ·  3 tall round domes, left scroll spiral, right tapered wing
      Body baseline y≈158, lobe peaks y≈16–24, lobe height ≈134px (~72% of viewbox)
      Each lobe ≈120px wide. Clockwise from right wing tip.
    -->
    <path stroke-width="4.5" d="
      M 558,106

      C 556,90  538,68  496,64

      C 490,20  366,20  360,64

      C 356,68  354,68  350,64

      C 344,16  236,16  230,64

      C 226,68  224,68  220,64

      C 214,22  100,22   94,68

      C 88,80   74,94    64,108

      C 54,116  36,116   30,130
      C 24,144  32,160   46,165
      C 60,170  76,162   78,150
      C 80,140  72,130   64,128

      C 76,138  112,152  152,156
      C 192,160 234,160  272,156
      C 304,160 342,160  378,156
      C 414,160 456,158  492,152

      C 512,148 532,138  546,128
      C 552,120 556,112  558,106
      Z
    "/>

    <!-- Scroll inner coil -->
    <path stroke-width="4" d="
      M 64,128
      C 54,116  50,98   60,84
      C 68,74   84,72   92,82
    "/>

    <!-- Depth arc between right lobe and center lobe -->
    <path stroke-width="4" d="
      M 360,64
